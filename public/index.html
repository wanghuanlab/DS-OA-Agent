<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>禅道日志 Agent</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <h1>禅道日志 Agent</h1>
          <div class="health" aria-label="禅道状态">
            <span id="vpnStatus" class="health-pill unknown">VPN：未检测</span>
            <span id="loginStatus" class="health-pill unknown">登录：未检测</span>
            <span id="taskStatus" class="health-pill unknown">任务：未检测</span>
          </div>
        </div>
        <div class="header-actions">
          <button id="checkStatus" type="button">状态检测与更新</button>
          <button id="saveConfig" type="button">保存配置</button>
        </div>
      </header>

      <section class="grid">
        <div class="panel">
          <h2>禅道</h2>
          <label>登录地址<input id="zentaoLoginUrl"></label>
          <label>用户名<input id="zentaoUsername"></label>
          <label>密码<input id="zentaoPassword" type="password"></label>
          <label>任务页地址<input id="zentaoTaskPageUrl"></label>
        </div>

        <div class="panel">
          <h2>LLM</h2>
          <label>Base URL<input id="llmBaseUrl"></label>
          <label>API Key<input id="llmApiKey" type="password"></label>
          <label>模型<input id="llmModel"></label>
        </div>
      </section>

      <section class="panel">
        <h2>填报设置</h2>
        <h3>选择日期</h3>
        <div class="row">
          <label>开始日期<input id="startDate" type="date"></label>
          <label>结束日期<input id="endDate" type="date"></label>
        </div>
        <h3>选择代码库目录</h3>
        <div class="repo-tools">
          <label>代码库目录<input id="repositoryPath" placeholder="输入或粘贴本机代码库目录"></label>
          <input id="directoryPicker" type="file" webkitdirectory directory hidden>
          <button id="chooseDirectory" type="button">选择文件夹</button>
          <button id="addRepository" type="button">添加</button>
          <button id="checkRepositories" type="button">检查代码库</button>
        </div>
        <div id="repositoryList" class="repo-list"></div>
        <label>提交人
          <select id="commitAuthors" multiple size="4"></select>
        </label>
        <div class="actions">
          <button id="generate">生成预览</button>
          <button id="savePreview">保存预览</button>
          <button id="submitNow">立即录入禅道</button>
        </div>
      </section>

      <section class="panel">
        <h2>预览</h2>
        <div id="status" class="status">正在加载...</div>
        <div id="preview"></div>
      </section>
    </main>
    <div id="directoryBrowser" class="modal" hidden>
      <div class="modal-body">
        <div class="modal-head">
          <strong>选择代码库目录</strong>
          <button id="closeDirectoryBrowser" type="button">关闭</button>
        </div>
        <div id="directoryCurrent" class="directory-current"></div>
        <div class="directory-actions">
          <button id="directoryParent" type="button">上一级</button>
          <button id="selectDirectory" type="button">选择当前目录</button>
        </div>
        <div id="directoryList" class="directory-list"></div>
      </div>
    </div>
    <div id="toastRoot" class="toast-root" aria-live="polite"></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
